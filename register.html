<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Studio | KrautCraft Fermentation Studio</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ca8a04' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='6' y='5' width='12' height='15' rx='3' /><rect x='8' y='2' width='8' height='3' rx='1' /><path d='M6 14c2 0 3-1 6-1s4 1 6 1' /><path d='M12 8c1.5 0 2 1 2 2s-1 2-2 2-2-1-2-2 1.5-2 2-2z' /></svg>">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--clr-bg-alt);
      padding: var(--sp-6);
      position: relative;
    }

    .auth-toggles {
      position: absolute;
      top: var(--sp-4);
      right: var(--sp-4);
      display: flex;
      gap: var(--sp-2);
      z-index: 100;
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--clr-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: var(--sp-10);
      text-align: center;
      position: relative; /* Anchor for toggles */
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: var(--sp-8) var(--sp-5);
      }
      .checkbox-wrap .fs-xs {
        font-size: 0.75rem;
      }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-4);
      margin-bottom: var(--sp-10);
      text-decoration: none;
      white-space: nowrap;
    }
    .auth-logo .logo-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .auth-logo .logo-mark {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #5C8A3C, #D48C31);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      line-height: 1;
      flex-shrink: 0;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .auth-logo .logo-name {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      color: var(--clr-text);
      font-weight: var(--fw-bold);
      line-height: 1;
    }

    .auth-logo .logo-tagline {
      font-size: var(--fs-xs);
      color: var(--clr-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }

    .auth-card h2 {
      font-size: var(--fs-md);
      font-weight: var(--fw-bold);
      margin-bottom: var(--sp-2);
      color: var(--clr-text);
      text-transform: none;
      letter-spacing: normal;
    }

    .social-btns {
      display: flex;
      justify-content: center;
      gap: var(--sp-4);
      margin-top: var(--sp-8);
    }

    .social-btn {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid var(--clr-border);
      border-radius: 12px;
      background: transparent;
      color: var(--clr-text);
      font-weight: var(--fw-bold);
      font-size: 1.2rem;
      transition: all var(--trans-fast);
      cursor: pointer;
    }

    .social-btn:hover {
      background: var(--clr-bg-alt);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      margin: var(--sp-8) 0;
      color: var(--clr-text-light);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--clr-border);
    }

    /* Auth Page Toggles - Top Right Corner */
    .auth-page-toggles {
      position: fixed;
      top: var(--sp-4);
      right: var(--sp-4);
      display: flex;
      gap: var(--sp-2);
      z-index: 1000;
    }

    /* Hide on mobile and tablet */
    @media (max-width: 768px) {
      .auth-page-toggles {
        display: none;
      }
    }
  </style>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" defer></script>
  <script src="js/main.js" defer></script>
</head>

<body>
  <!-- Top Right Toggles - Web View Only -->
  <div class="auth-page-toggles">
    <button class="toggle-btn" id="rtl-toggle" aria-label="Toggle RTL layout">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="7" y1="9" x2="17" y2="9" />
            <polyline points="13 5 17 9 13 13" />
            <line x1="17" y1="15" x2="7" y2="15" />
            <polyline points="11 11 7 15 11 19" />
          </svg>
    </button>
    <button class="toggle-btn" id="theme-toggle" aria-label="Toggle dark mode">
      <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
      <svg class="icon-moon d-none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
      </svg>
    </button>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <a href="index.html" class="site-logo">
        <div class="logo-mark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="5" width="12" height="15" rx="3" />
            <rect x="8" y="2" width="8" height="3" rx="1" />
            <path d="M6 14c2 0 3-1 6-1s4 1 6 1" />
            <path d="M12 8c1.5 0 2 1 2 2s-1 2-2 2-2-1-2-2 1.5-2 2-2z" />
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">KrautCraft</span>
          <span class="logo-tagline">Fermentation Studio</span>
        </div>
      </a>

      <h2 style="font-size: 2.2rem; font-weight: var(--fw-bold); color: var(--clr-text); margin-bottom: 0.5rem;">Start Fermenting Today</h2>
      <p class="text-muted fs-base mb-8">Join 50,000+ artisans learning the craft.</p>

      <form id="register-form">
        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="fname">First Name</label>
          <input type="text" id="fname" class="form-control" placeholder="Your first name" required>
        </div>
        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="lname">Last Name</label>
          <input type="text" id="lname" class="form-control" placeholder="Your last name" required>
        </div>

        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">📧</span>
            <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
          </div>
        </div>

        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="password">Create Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" class="form-control" placeholder="Create a password" required>
            <button type="button" class="pw-toggle" aria-label="Show password">👁️</button>
          </div>
          <span class="form-hint">Use at least 8 characters with letters & numbers.</span>
        </div>

        <div class="form-group" style="text-align:left;">
          <label class="form-label" for="confirm-password">Confirm Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password"
              required>
          </div>
        </div>

        <div class="mb-8" style="text-align:left;">
          <label class="checkbox-wrap" style="display: flex; align-items: flex-start; gap: var(--sp-2);">
            <input type="checkbox" required style="margin-top: 3px;">
            <span class="fs-xs">I agree to the <a href="#">Terms & Conditions</a></span>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="register-btn">Create Account</button>
      </form>

      <div class="auth-divider">Or join with</div>

      <div class="social-btns">
        <button class="social-btn" aria-label="Continue with Google">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
        </button>
        <button class="social-btn" aria-label="Continue with Apple">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05 1.61-3.22 1.61-1.14 0-1.53-.67-2.85-.67-1.32 0-1.78.65-2.85.65-1.15 0-2.2-.7-3.15-1.63-1.95-1.9-3.43-5.33-3.43-8.24 0-4.66 3-7.1 5.86-7.1 1.5 0 2.65.65 3.52.65.85 0 2.27-.78 3.9-.78 1.43 0 3.65.63 4.83 2.33-3.2 1.9-2.7 6.13.53 7.42-1.07 2.45-2.2 4.43-3.2 5.4zm-4.75-16.1c0-1.7 1.4-3.1 3.1-3.1.1 0 .2 0 .3.02C15.6 2.8 14.2 4.2 14.2 5.9c0 1.6 1.4 3 3 3h.1c-.2 1.8-1.7 3.2-3.4 3.2-.2 0-.4-.02-.6-.05 1.5-2.1 1.4-4.2-1-4.87z"/>
          </svg>
        </button>
      </div>

      <p class="fs-sm mt-8 text-muted">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    $(document).ready(function () {
      $('#register-form').on('submit', function (e) {
        e.preventDefault();
        const $btn = $('#register-btn');
        $btn.html('Creating Account...').prop('disabled', true);

        setTimeout(() => {
          window.showToast('success', 'Welcome, Artisan!', 'Account created successfully. Redirecting...');
          setTimeout(() => window.location.href = 'dashboard-user.html', 1500);
        }, 1200);
      });
    });
  </script>
</body>

</html>
